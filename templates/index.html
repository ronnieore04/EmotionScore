<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255,255,255,0.08);
      --text: #e8e6f0;
      --muted: #8b8a9a;
      --accent: #7c6af7;
      --radius: 14px;
      --joy:     #f9c74f;
      --sadness: #4895ef;
      --anger:   #e63946;
      --fear:    #9b5de5;
      --surprise:#f4a261;
      --disgust: #52b788;
      --neutral: #6c757d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .container { width: 100%; max-width: 680px; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 130px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      gap: 12px;
    }
    #charCount { color: var(--muted); font-size: 0.85rem; }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 28px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    button.loading .spinner { display: block; }
    button.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; }

    .dominant-badge {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .emotion-icon { font-size: 2.2rem; line-height: 1; }
    .dominant-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .dominant-name { font-size: 1.4rem; font-weight: 700; text-transform: capitalize; }
    .sentiment-pill {
      margin-left: auto;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: capitalize;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
    }

    /* Emotion bars */
    .bars-grid { display: flex; flex-direction: column; gap: 12px; }
    .bar-row { display: grid; grid-template-columns: 90px 1fr 42px; align-items: center; gap: 12px; }
    .bar-label { font-size: 0.88rem; color: var(--muted); text-transform: capitalize; text-align: right; }
    .bar-track {
      background: var(--surface2);
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      width: 0%;
      transition: width 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bar-score { font-size: 0.82rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    .explanation {
      margin-top: 20px;
      padding: 14px 16px;
      background: var(--surface2);
      border-radius: 10px;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
      border-left: 3px solid var(--accent);
    }

    .error-box {
      background: rgba(230, 57, 70, 0.1);
      border: 1px solid rgba(230, 57, 70, 0.3);
      color: #f08080;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.9rem;
      display: none;
    }

    /* Sample prompts */
    .samples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .sample-btn {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.8rem;
      font-weight: 400;
      cursor: pointer;
    }
    .sample-btn:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Emotion Detector</h1>
    <p>Paste any text and discover the emotions within it</p>
  </header>

  <div class="card">
    <textarea id="textInput" placeholder="Type or paste text here — a journal entry, message, news headline, speech, song lyric…" maxlength="2000"></textarea>
    <div class="controls">
      <span id="charCount">0 / 2000</span>
      <button id="analyzeBtn" onclick="analyze()">
        <div class="spinner"></div>
        <span class="btn-label">Analyze</span>
      </button>
    </div>
    <div class="samples">
      <span style="font-size:0.8rem;color:var(--muted);align-self:center;">Try:</span>
      <button class="sample-btn" onclick="setSample(this)">I can't believe they did this to me again. I'm done.</button>
      <button class="sample-btn" onclick="setSample(this)">Today was the best day of my life. I got the job!</button>
      <button class="sample-btn" onclick="setSample(this)">I heard something strange in the house at 3am. I was alone.</button>
      <button class="sample-btn" onclick="setSample(this)">The merger announcement came out of nowhere. Nobody saw it coming.</button>
    </div>
  </div>

  <div id="errorBox" class="error-box"></div>

  <div id="results" class="card">
    <div id="dominantBadge" class="dominant-badge"></div>
    <div class="bars-grid" id="barsGrid"></div>
    <div class="explanation" id="explanation"></div>
  </div>
</div>

<script>
const EMOTION_META = {
  joy:      { color: '#f9c74f', icon: '😄' },
  sadness:  { color: '#4895ef', icon: '😢' },
  anger:    { color: '#e63946', icon: '😡' },
  fear:     { color: '#9b5de5', icon: '😨' },
  surprise: { color: '#f4a261', icon: '😮' },
  disgust:  { color: '#52b788', icon: '🤢' },
  neutral:  { color: '#6c757d', icon: '😐' },
};

const SENTIMENT_COLORS = {
  positive: '#52b788',
  negative: '#e63946',
  neutral:  '#6c757d',
  mixed:    '#f4a261',
};

const textarea = document.getElementById('textInput');
const charCount = document.getElementById('charCount');
textarea.addEventListener('input', () => {
  charCount.textContent = `${textarea.value.length} / 2000`;
});

function setSample(btn) {
  textarea.value = btn.textContent.trim();
  charCount.textContent = `${textarea.value.length} / 2000`;
  textarea.focus();
}

async function analyze() {
  const text = textarea.value.trim();
  if (!text) { textarea.focus(); return; }

  const btn = document.getElementById('analyzeBtn');
  const errorBox = document.getElementById('errorBox');
  const results = document.getElementById('results');

  btn.disabled = true;
  btn.classList.add('loading');
  errorBox.style.display = 'none';
  results.style.display = 'none';

  try {
    const res = await fetch('/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();

    if (!res.ok || data.error) {
      throw new Error(data.error || 'Unknown error');
    }

    renderResults(data);
  } catch (err) {
    errorBox.textContent = err.message || 'Something went wrong. Please try again.';
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function renderResults(data) {
  const { emotions, dominant_emotion, sentiment, explanation } = data;
  const meta = EMOTION_META[dominant_emotion] || { color: '#888', icon: '🔍' };

  // Dominant badge
  document.getElementById('dominantBadge').innerHTML = `
    <span class="emotion-icon">${meta.icon}</span>
    <div>
      <div class="dominant-label">Dominant emotion</div>
      <div class="dominant-name" style="color:${meta.color}">${dominant_emotion}</div>
    </div>
    <span class="sentiment-pill" style="color:${SENTIMENT_COLORS[sentiment] || '#888'}">${sentiment}</span>
  `;
  document.getElementById('dominantBadge').style.background =
    meta.color + '18';
  document.getElementById('dominantBadge').style.borderColor =
    meta.color + '44';

  // Bars — sort by score descending
  const sorted = Object.entries(emotions).sort((a, b) => b[1] - a[1]);
  const barsGrid = document.getElementById('barsGrid');
  barsGrid.innerHTML = '';

  sorted.forEach(([name, score]) => {
    const m = EMOTION_META[name] || { color: '#888' };
    const pct = Math.round(score * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `
      <span class="bar-label">${name}</span>
      <div class="bar-track">
        <div class="bar-fill" data-pct="${pct}" style="background:${m.color}"></div>
      </div>
      <span class="bar-score">${pct}%</span>
    `;
    barsGrid.appendChild(row);
  });

  document.getElementById('explanation').textContent = explanation;
  document.getElementById('results').style.display = 'block';

  // Animate bars after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }));
}

textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyze();
});
</script>
</body>
</html>
